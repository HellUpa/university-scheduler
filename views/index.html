<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCTTP Scheduler AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #4f46e5; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Кастомный скроллбар для широкой таблицы */
        .table-container::-webkit-scrollbar { height: 8px; }
        .table-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans pb-10">

<div class="mx-auto px-4 py-8 max-w-[1400px]">
    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 bg-white p-6 rounded-xl shadow-sm border border-gray-100 gap-4">
        <div>
            <h1 class="text-3xl font-extrabold text-indigo-600 tracking-tight">AI Scheduler</h1>
            <p class="text-sm text-gray-500 mt-1">Матричное расписание (Группы / Время)</p>
        </div>
        
        <!-- Панель гиперпараметров -->
        <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">Популяция</label>
                <input type="number" id="popSize" value="200" class="w-20 mt-1 px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">Поколения</label>
                <input type="number" id="genCount" value="200" class="w-20 mt-1 px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">Мутация</label>
                <input type="number" id="mutRate" step="0.01" value="0.05" class="w-20 mt-1 px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:border-indigo-500">
            </div>
        </div>

        <!-- Кнопки запуска -->
        <div class="flex gap-3">
            <button onclick="generateSchedule('greedy')" class="px-5 py-2.5 bg-gray-800 hover:bg-gray-900 text-white font-medium rounded-lg transition-colors shadow-sm">
                ⚡ Жадный
            </button>
            <button onclick="generateSchedule('genetic')" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition-colors shadow-sm flex items-center gap-2">
                🧬 Генетический
            </button>
        </div>
    </header>

    <!-- Stats Panel -->
    <div id="statsPanel" class="hidden mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
            <p class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Фитнес-оценка</p>
            <p id="statFitness" class="text-3xl font-extrabold text-gray-800 mt-1">-</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
            <p class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Время генерации</p>
            <p id="statTime" class="text-3xl font-extrabold text-gray-800 mt-1">-</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
            <p class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Алгоритм</p>
            <p id="statAlgo" class="text-3xl font-extrabold text-indigo-600 mt-1">-</p>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loader" class="hidden flex flex-col justify-center items-center py-32">
        <div class="loader ease-linear rounded-full border-4 border-gray-200 h-16 w-16 mb-6"></div>
        <p class="text-gray-500 font-medium animate-pulse text-lg" id="loadingText">Оптимизация расписания...</p>
    </div>

    <!-- Matrix Schedule Table -->
    <div id="scheduleContainer" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden table-container overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-[800px]">
            <thead class="bg-gray-100 text-gray-700 text-sm tracking-wider border-b-2 border-gray-300" id="matrixHead">
                <!-- Генерируется JS -->
            </thead>
            <tbody id="matrixBody" class="text-sm divide-y divide-gray-200">
                <!-- Генерируется JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const dayTranslations = {
        "monday": "Понедельник", "tuesday": "Вторник", "wednesday": "Среда",
        "thursday": "Четверг", "friday": "Пятница", "saturday": "Суббота"
    };
    const daysOrder = ["monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];

    async function generateSchedule(type) {
        const loader = document.getElementById('loader');
        const container = document.getElementById('scheduleContainer');
        const stats = document.getElementById('statsPanel');
        const loadingText = document.getElementById('loadingText');

        // Читаем параметры из инпутов
        const popSize = parseInt(document.getElementById('popSize').value) || 200;
        const genCount = parseInt(document.getElementById('genCount').value) || 200;
        const mutRate = parseFloat(document.getElementById('mutRate').value) || 0.05;

        loader.classList.remove('hidden');
        container.classList.add('hidden');
        stats.classList.add('hidden');
        loadingText.innerText = type === 'genetic' ? '🧬 Идет процесс эволюции (AI)...' : '⚡ Работает жадный алгоритм...';

        try {
            const endpoint = type === 'genetic' ? '/api/v1/schedule/generate/genetic' : '/api/v1/schedule/generate/greedy';
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ population_size: popSize, generations: genCount, mutation_rate: mutRate })
            });

            const data = await response.json();

            if (data.status !== 'success') {
                alert('Ошибка генерации: ' + data.error);
                return;
            }

            // Обновляем статистику
            document.getElementById('statFitness').innerText = data.fitness_score.toFixed(4);
            document.getElementById('statFitness').className = `text-3xl font-extrabold mt-1 ${data.fitness_score >= 1.0 ? 'text-green-600' : 'text-red-500'}`;
            document.getElementById('statTime').innerText = `${data.time_taken_ms} мс`;
            document.getElementById('statAlgo').innerText = data.algorithm;

            renderMatrix(data.schedule);

            stats.classList.remove('hidden');
            container.classList.remove('hidden');

        } catch (error) {
            alert('Ошибка сети или сервера: ' + error);
        } finally {
            loader.classList.add('hidden');
        }
    }

    function renderMatrix(scheduleItems) {
        // 1. Извлекаем уникальные группы и уникальное время (слоты)
        const groupsSet = new Set();
        const timesSet = new Set();
        
        // Матрица: matrix[day][time][group] = item
        const matrix = {}; 

        scheduleItems.forEach(item => {
            timesSet.add(item.time);
            if (!matrix[item.day]) matrix[item.day] = {};
            if (!matrix[item.day][item.time]) matrix[item.day][item.time] = {};

            // item.groups уже является массивом ["CS-101", "CS-102"]
            item.groups.forEach(g => {
                groupsSet.add(g);
                matrix[item.day][item.time][g] = item; 
            });
        });

        const groups = Array.from(groupsSet).sort();
        const times = Array.from(timesSet).sort();

        // 2. Генерируем заголовок таблицы (Группы)
        const thead = document.getElementById('matrixHead');
        let headHTML = `<tr><th class="p-4 w-32 border-r border-gray-200 bg-gray-100 sticky left-0 z-10">Время</th>`;
        groups.forEach(g => {
            headHTML += `<th class="p-4 border-r border-gray-200 text-center font-bold text-indigo-900">${g}</th>`;
        });
        headHTML += `</tr>`;
        thead.innerHTML = headHTML;

        // 3. Генерируем тело таблицы
        const tbody = document.getElementById('matrixBody');
        let bodyHTML = '';

        daysOrder.forEach(day => {
            if (!matrix[day]) return; // Пропускаем пустые дни

            // Строка-разделитель с названием дня
            bodyHTML += `
                <tr class="bg-indigo-50 border-y-2 border-indigo-100">
                    <td colspan="${groups.length + 1}" class="p-3 text-center font-bold text-indigo-700 uppercase tracking-widest sticky left-0">
                        ${dayTranslations[day] || day}
                    </td>
                </tr>
            `;

            // Строки со слотами времени
            times.forEach(time => {
                if (!matrix[day][time]) return; // В это время вообще нет пар

                bodyHTML += `<tr class="hover:bg-gray-50 transition-colors">`;
                // Колонка времени (залипает слева при скролле)
                bodyHTML += `<td class="p-3 border-r border-gray-200 font-medium text-gray-600 bg-white sticky left-0 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] text-center whitespace-nowrap">${time}</td>`;

                // Колонки групп
                groups.forEach(group => {
                    const item = matrix[day][time][group];
                    if (item) {
                        // Есть пара!
                        // Если это лекция (много групп), можно подсветить другим цветом
                        const isLecture = item.groups.includes(',');
                        const bgClass = isLecture ? 'bg-blue-50 border-blue-200' : 'bg-green-50 border-green-200';
                        
                        bodyHTML += `
                            <td class="p-2 border-r border-gray-200 align-top w-48 min-w-[12rem]">
                                <div class="${bgClass} border rounded-md p-2 h-full shadow-sm flex flex-col justify-between">
                                    <div class="font-bold text-gray-800 text-[13px] leading-tight mb-1">${item.subject}</div>
                                    <div class="text-xs text-gray-600 mb-2">${item.instructor}</div>
                                    <div class="text-[11px] font-mono bg-white px-1.5 py-0.5 rounded text-gray-500 inline-block self-start border border-gray-100">
                                        📍 ${item.room}
                                    </div>
                                </div>
                            </td>
                        `;
                    } else {
                        // Окно (пусто)
                        bodyHTML += `<td class="p-2 border-r border-gray-100 bg-gray-50/50"></td>`;
                    }
                });
                bodyHTML += `</tr>`;
            });
        });

        tbody.innerHTML = bodyHTML;
    }
</script>
</body>
</html>
